version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: book-review-app
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__CatalogDbContext: Data Source=/app/data/catalog.db
      Anthropic__ApiKey: ${ANTHROPIC_API_KEY:-dummy-key-for-now}
    volumes:
      - ./ispit/data:/app/data
      - ./ispit/Logs:/app/Logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/Health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  app-network:
    driver: bridge
